<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Olimpollo - Reportes</title>
    <style>
        :root{--bg-main:#ECF0F1;--accent-color:#db3434;} body{font-family: sans-serif; background: var(--bg-main); padding: 20px;}
        .card{background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
        .filtros-grid{display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;}
        table{width:100%; border-collapse: collapse; margin-top: 15px;}
        th, td{padding: 10px; border-bottom: 1px solid #ddd; text-align: left;}
        .btn{padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: var(--accent-color); color: white;}
    </style>
</head>
<body>
    <main>
        <h2>Reportes</h2>
        <div class="card">
            <div class="filtros-grid">
                <select id="select-tipo-reporte">
                    <option value="">Seleccionar Tipo</option>
                    <option value="ventas">Reporte de Ventas</option>
                    <option value="platillos">Popularidad de Platillos</option>
                    <option value="insumos_teoricos">Uso Insumos Teórico</option>
                    <option value="cogs">KPI: Porcentaje COGS</option>
                    <option value="semanal_gerencial">Resumen Semanal</option>
                </select>
                <input type="date" id="fechaInicio">
                <input type="date" id="fechaFin">
                <button id="btn-generar" class="btn">Generar Reporte</button>
            </div>
            <p id="mensaje-reporte"></p>
        </div>
        <div id="resultados-reporte" class="card" style="display: none;"></div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_URL = 'https://olimpollo-api.onrender.com/api/reportes';
        
        const generarReporteCOGS = async (fIni, fFin) => {
            try {
                const resCogs = await fetch(`${API_URL}/cogs?fechaInicio=${fIni}&fechaFin=${fFin}`);
                const resVentas = await fetch(`${API_URL}/ventas?fechaInicio=${fIni}&fechaFin=${fFin}`);
                const dataCogs = await resCogs.json();
                const dataVentas = await resVentas.json();
                
                const ventaBruta = parseFloat(dataVentas.ventas_totales || 0);
                const costoTotal = parseFloat(dataCogs.costo_total || 0);
                const porcentaje = ventaBruta > 0 ? (costoTotal / ventaBruta) * 100 : 0;
                
                document.getElementById('resultados-reporte').innerHTML = `
                    <h3>KPI: COGS</h3>
                    <div style="font-size: 2em; color: ${porcentaje > 35 ? 'red' : 'green'}">${porcentaje.toFixed(2)}%</div>
                    <p>Costo: $${costoTotal.toFixed(2)} | Venta: $${ventaBruta.toFixed(2)}</p>`;
                document.getElementById('resultados-reporte').style.display = 'block';
            } catch (e) { alert(e.message); }
        };

        document.getElementById('btn-generar').addEventListener('click', () => {
            const tipo = document.getElementById('select-tipo-reporte').value;
            const fIni = document.getElementById('fechaInicio').value;
            const fFin = document.getElementById('fechaFin').value;
            
            if(!tipo || !fIni || !fFin) return alert("Selecciona tipo y fechas");
            
            if(tipo === 'cogs') {
                generarReporteCOGS(fIni, fFin);
            } else {
                alert("Esta función requiere la implementación de los otros reportes ya existentes.");
            }
        });
    });
</script>
</body>
</html>
