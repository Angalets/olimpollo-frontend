<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Olimpollo - Reportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg-main:#ECF0F1;--bg-header:#FFFFFF;--card-bg:#FFFFFF;--primary-text:#502c2c;--accent-color:#db3434;}
        body{margin:0;font-family:'Poppins', sans-serif;background-color:var(--bg-main);padding:40px;}
        .card{background:var(--card-bg);padding:25px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-bottom:25px;}
        .filtros-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;align-items:flex-end;}
        .btn{padding:12px;border:none;border-radius:8px;cursor:pointer;background:var(--accent-color);color:white;font-weight:600;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;}
    </style>
</head>
<body>
    <main>
        <h2 class="page-title">Generador de Reportes</h2>
        <div class="card">
            <div class="filtros-grid">
                <div>
                    <label>Tipo de Reporte:</label>
                    <select id="select-tipo-reporte" style="width:100%; padding:10px;">
                        <option value="">Seleccionar Tipo</option>
                        <option value="platillos">Conteo de Platillos</option>
                        <option value="ventas">Reporte de Ventas</option>
                        <option value="insumos_teoricos">Uso de Insumos (Teórico)</option>
                        <option value="historico_inventario">Inventario Histórico</option>
                        <option value="semanal_gerencial">Resumen Semanal Gerencial</option>
                        <option value="cogs">KPI: Porcentaje COGS</option>
                    </select>
                </div>
                <div><label>Fecha Inicio / Única:</label><input type="date" id="fechaInicio" style="width:100%; padding:10px;"></div>
                <div><label>Fecha Fin:</label><input type="date" id="fechaFin" style="width:100%; padding:10px;"></div>
                <div><button id="btn-generar" class="btn" style="width: 100%;">Generar Reporte</button></div>
            </div>
            <p id="mensaje-reporte" style="margin-top: 15px; text-align: center;"></p>
        </div>
        <div id="resultados-reporte" class="card" style="display: none;"></div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_URL = 'https://olimpollo-api.onrender.com/api/reportes';
        const botonGenerar = document.getElementById('btn-generar');
        const resultadosDiv = document.getElementById('resultados-reporte');
        const mensajeElemento = document.getElementById('mensaje-reporte');

        // Función centralizada para calcular COGS
        const generarReporteCOGS = async (fIni, fFin) => {
            resultadosDiv.innerHTML = '<h4>Calculando Costo de Alimentos (COGS)...</h4>';
            resultadosDiv.style.display = 'block';
            try {
                const [resCogs, resVentas] = await Promise.all([
                    fetch(`${API_URL}/cogs?fechaInicio=${fIni}&fechaFin=${fFin}`),
                    fetch(`${API_URL}/ventas?fechaInicio=${fIni}&fechaFin=${fFin}`)
                ]);
                const dataCogs = await resCogs.json();
                const dataVentas = await resVentas.json();

                const ventaBruta = parseFloat(dataVentas.ventas_totales || 0);
                const costoTotal = parseFloat(dataCogs.costo_total || 0);
                const porcentaje = ventaBruta > 0 ? (costoTotal / ventaBruta) * 100 : 0;

                resultadosDiv.innerHTML = `
                    <h3>KPI: Porcentaje COGS</h3>
                    <div style="text-align:center; padding:20px;">
                        <div style="font-size: 3em; font-weight: 900; color: ${porcentaje > 35 ? 'red' : 'green'}">${porcentaje.toFixed(2)}%</div>
                        <p>Costo Insumos: <strong>$${costoTotal.toFixed(2)}</strong> | Venta Bruta: <strong>$${ventaBruta.toFixed(2)}</strong></p>
                    </div>`;
                mensajeElemento.textContent = 'KPI calculado.';
            } catch (e) { alert("Error al generar KPI: " + e.message); }
        };

        botonGenerar.addEventListener('click', () => {
            const tipo = document.getElementById('select-tipo-reporte').value;
            const fIni = document.getElementById('fechaInicio').value;
            const fFin = document.getElementById('fechaFin').value;

            if(!tipo || !fIni) return alert("Selecciona tipo y fecha de inicio");

            if (tipo === 'cogs') {
                generarReporteCOGS(fIni, fFin);
            } else {
                alert("Reporte no implementado en esta vista. Selecciona COGS.");
            }
        });
    });
</script>
</body>
</html>
