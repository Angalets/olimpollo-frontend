<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Olimpollo - Reportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg-main:#ECF0F1;--bg-header:#FFFFFF;--card-bg:#FFFFFF;--primary-text:#502c2c;--secondary-text:#808B96;--accent-color:#db3434;}
        body{margin:0;font-family:'Poppins', sans-serif;background-color:var(--bg-main);padding:40px;}
        .card{background:white;padding:25px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-bottom:25px;}
        .filtros-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;align-items:flex-end;}
        .btn{padding:12px;border:none;border-radius:8px;cursor:pointer;background:var(--accent-color);color:white;font-weight:600;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;}
    </style>
</head>
<body>
    <main>
        <h2>Generador de Reportes</h2>
        <div class="card">
            <div class="filtros-grid">
                <div>
                    <label>Tipo de Reporte:</label>
                    <select id="select-tipo-reporte" style="width:100%; padding:10px;">
                        <option value="">Seleccionar Tipo</option>
                        <option value="ventas">Reporte de Ventas</option>
                        <option value="platillos">Popularidad de Platillos</option>
                        <option value="insumos_teoricos">Uso Insumos Teórico</option>
                        <option value="cogs">KPI: Porcentaje COGS</option>
                        <option value="semanal_gerencial">Resumen Semanal</option>
                    </select>
                </div>
                <div><label>Fecha Inicio:</label><input type="date" id="fechaInicio" style="width:100%; padding:10px;"></div>
                <div><label>Fecha Fin:</label><input type="date" id="fechaFin" style="width:100%; padding:10px;"></div>
                <div><button id="btn-generar" class="btn" style="width: 100%;">Generar Reporte</button></div>
            </div>
        </div>
        <div id="resultados-reporte" class="card" style="display: none;"></div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_URL = 'https://olimpollo-api.onrender.com/api/reportes';
        const resultadosDiv = document.getElementById('resultados-reporte');

        // --- FUNCIONES DE REPORTES ---
        const generarReporteVentas = async (fI, fF) => {
            const res = await fetch(`${API_URL}/ventas?fechaInicio=${fI}&fechaFin=${fF}`);
            const data = await res.json();
            resultadosDiv.innerHTML = `<h3>Ventas</h3><p>Total Pedidos: ${data.total_pedidos}</p><p>Ingreso Neto: $${data.ventas_totales}</p>`;
            resultadosDiv.style.display = 'block';
        };

        const generarReportePlatillos = async (fI, fF) => {
            const res = await fetch(`${API_URL}/platillos?fechaInicio=${fI}&fechaFin=${fF}`);
            const data = await res.json();
            let html = `<h3>Platillos</h3><table><tr><th>Producto</th><th>Cantidad</th></tr>`;
            data.forEach(p => html += `<tr><td>${p.producto}</td><td>${p.cantidad_vendida}</td></tr>`);
            resultadosDiv.innerHTML = html + `</table>`;
            resultadosDiv.style.display = 'block';
        };

        const generarReporteInsumos = async (fI, fF) => {
            const res = await fetch(`${API_URL}/insumos-teoricos?fechaInicio=${fI}&fechaFin=${fF}`);
            const data = await res.json();
            let html = `<h3>Uso Insumos</h3><table><tr><th>Insumo</th><th>Total</th></tr>`;
            data.forEach(i => html += `<tr><td>${i.nombre_insumo}</td><td>${i.cantidad_total} ${i.unidad}</td></tr>`);
            resultadosDiv.innerHTML = html + `</table>`;
            resultadosDiv.style.display = 'block';
        };

        const generarReporteCOGS = async (fI, fF) => {
            const [resCogs, resVentas] = await Promise.all([
                fetch(`${API_URL}/cogs?fechaInicio=${fI}&fechaFin=${fF}`),
                fetch(`${API_URL}/ventas?fechaInicio=${fI}&fechaFin=${fF}`)
            ]);
            const dataCogs = await resCogs.json();
            const dataVentas = await resVentas.json();
            const porc = dataVentas.ventas_totales > 0 ? (dataCogs.costo_total / dataVentas.ventas_totales) * 100 : 0;
            resultadosDiv.innerHTML = `<h3>KPI: COGS</h3><div style="font-size:2em; color:green;">${porc.toFixed(2)}%</div>`;
            resultadosDiv.style.display = 'block';
        };

        // --- MANEJADOR BOTÓN ---
        document.getElementById('btn-generar').addEventListener('click', () => {
            const tipo = document.getElementById('select-tipo-reporte').value;
            const fI = document.getElementById('fechaInicio').value;
            const fF = document.getElementById('fechaFin').value;
            
            if(!tipo || !fI || !fF) return alert("Selecciona tipo y fechas");

            if(tipo === 'ventas') generarReporteVentas(fI, fF);
            else if(tipo === 'platillos') generarReportePlatillos(fI, fF);
            else if(tipo === 'insumos_teoricos') generarReporteInsumos(fI, fF);
            else if(tipo === 'cogs') generarReporteCOGS(fI, fF);
            else alert("Función no implementada");
        });
    });
</script>
</body>
</html>
