<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Profesional - Olimpollo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
    <style>
        :root { --bg-dark: #0F172A; --bg-panel: #1E293B; --bg-light: #F1F5F9; --white: #FFFFFF; --text-main: #334155; --text-muted: #64748B; --primary: #3B82F6; --success: #10B981; --danger: #EF4444; --warning: #F59E0B; --border: #E2E8F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg-light); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--bg-dark); color: var(--white); padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 50; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links a { color: #94A3B8; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 12px; border-radius: 6px; }
        .nav-links a:hover, .nav-links a.active { color: var(--white); background: rgba(255,255,255,0.1); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-intercom { background: var(--warning); color: #fff; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .user-badge { font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; }
        .btn-logout { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); padding: 5px 15px; border-radius: 6px; cursor: pointer; }
        main { display: flex; flex: 1; height: calc(100vh - 60px); overflow: hidden; }
        .menu-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-light); border-right: 1px solid var(--border); }
        .category-bar { display: flex; gap: 10px; padding: 15px; background: var(--white); overflow-x: auto; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .btn-category { padding: 12px 20px; border: 2px solid transparent; background: var(--bg-light); color: var(--text-muted); border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .btn-category.active { background: var(--primary); color: var(--white); }
        .products-grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; align-content: start; }
        .btn-product { background: var(--white); border: 2px solid transparent; border-radius: 12px; padding: 15px 10px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; align-items: center; text-align: center; height: 140px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .btn-product:active { transform: scale(0.95); }
        .btn-product.has-mods { border-color: var(--primary); }
        .btn-product.has-mods::after { content: 'MODS'; position: absolute; top: 0; right: 0; background: var(--primary); color: white; font-size: 9px; font-weight: 800; padding: 2px 6px; border-bottom-left-radius: 8px; }
        .prod-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .prod-price { font-size: 16px; font-weight: 800; color: var(--success); }
        .ticket-panel { width: 420px; background: var(--white); display: flex; flex-direction: column; flex-shrink: 0; box-shadow: -4px 0 15px rgba(0,0,0,0.05); z-index: 10; }
        .ticket-customer { padding: 15px; border-bottom: 1px solid var(--border); background: #F8FAFC; }
        .search-crm { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-crm { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        .btn-search { background: var(--bg-panel); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }
        .ticket-items { flex: 1; overflow-y: auto; padding: 15px; background: var(--white); }
        .empty-cart { text-align: center; color: var(--text-muted); margin-top: 50px; font-weight: 500; }
        .cart-item { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px dashed var(--border); }
        .cart-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-name { font-weight: 700; font-size: 15px; }
        .item-mods { font-size: 12px; color: var(--text-muted); display: block; margin-top: 2px; }
        .item-note { font-size: 11px; color: var(--warning); font-weight: 600; display: block; }
        .item-price { font-weight: 800; font-size: 15px; }
        .item-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .qty-controls { display: flex; align-items: center; background: var(--bg-light); border-radius: 20px; overflow: hidden; }
        .btn-qty { background: transparent; border: none; width: 35px; height: 32px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .qty-display { width: 30px; text-align: center; font-weight: 700; font-size: 14px; }
        .btn-action-sm { background: var(--bg-light); border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .ticket-checkout { padding: 15px; border-top: 2px solid var(--border); background: var(--bg-light); flex-shrink: 0; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .checkout-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .select-btn { width: 100%; padding: 10px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; font-weight: 600; font-size: 13px; text-align: left; display: flex; justify-content: space-between; cursor: pointer;}
        .totals-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .total-amount { font-size: 32px; font-weight: 800; color: var(--text-main); line-height: 1; }
        .btn-pay { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--white); padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; position: relative; }
        .opt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .btn-opt { background: var(--bg-light); border: 2px solid transparent; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; text-align: center;}
        .btn-opt.active { background: #EFF6FF; border-color: var(--primary); color: var(--primary); }
        
        /* Banner de Edición */
        #edit-banner { display: none; background: var(--warning); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 14px; }
        .btn-cancel-edit { background: rgba(0,0,0,0.2); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo"><i class="fas fa-cash-register"></i> POS Olimpollo</a>
            <nav class="nav-links">
                <a href="pedidos_lista.html">Historial</a>
                <a href="clientes.html">CRM</a>
            </nav>
        </div>
        <div class="header-actions">
            <button id="btn-abrir-intercom" class="btn-intercom"><i class="fas fa-bullhorn"></i> Cocina</button>
            <span class="user-badge" id="user-identifier">Cajero</span>
            <button class="btn-logout" id="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div id="edit-banner">⚠️ MODO EDICIÓN: Modificando Pedido <span id="edit-id-label"></span> <button class="btn-cancel-edit" onclick="cancelarEdicion()">Cancelar Edición</button></div>

    <main>
        <div class="menu-panel">
            <div class="category-bar" id="category-container"><button class="btn-category active" data-cat="Todos">Todos</button></div>
            <div class="products-grid" id="productos-container"><p style="text-align:center; padding: 40px;">Cargando...</p></div>
        </div>

        <div class="ticket-panel">
            <div class="ticket-customer">
                <div class="search-crm">
                    <input type="tel" id="cliente-telefono" class="input-crm" placeholder="Buscar Teléfono (Opcional)...">
                    <button type="button" id="btn-buscar-cliente" class="btn-search"><i class="fas fa-search"></i></button>
                </div>
                <div id="info-cliente-crm" style="font-size: 12px; margin-bottom: 5px; display: none;"></div>
                <input type="text" id="cliente-nombre" class="input-crm" placeholder="Nombre o Mesa del Cliente *" required style="width: 100%; border-color: var(--primary); box-shadow: 0 0 5px rgba(59,130,246,0.3);">
            </div>

            <div class="ticket-items" id="lista-carrito"></div>

            <div class="ticket-checkout">
                <div class="checkout-group" style="margin-bottom: 10px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <button type="button" class="btn-opt btn-tipo active" data-tipo="Para Llevar">🛍️ Llevar</button>
                        <button type="button" class="btn-opt btn-tipo" data-tipo="Comedor">🍽️ Comedor</button>
                    </div>
                </div>

                <div class="checkout-grid">
                    <div class="checkout-group"><label>Canal</label><button class="select-btn" id="btn-select-canal">OyR</button></div>
                    <div class="checkout-group"><label>Pago</label><button class="select-btn" id="btn-select-pago">Efectivo</button></div>
                </div>

                <div class="checkout-grid">
                    <div class="checkout-group">
                        <label>Ajuste Manual ($)</label>
                        <input type="number" id="ajuste-total" class="input-crm" placeholder="Opcional" step="0.01">
                    </div>
                    <div class="checkout-group">
                        <label>Descuento (%)</label>
                        <select id="select-descuento" class="input-crm" style="width: 100%; padding: 10px; background: white;">
                            <option value="0">0%</option>
                            <option value="10">10%</option>
                            <option value="20">20%</option>
                            <option value="50">50%</option>
                            <option value="100">100% (Cortesía)</option>
                        </select>
                    </div>
                </div>

                <div class="totals-row">
                    <span class="total-label" style="font-size:18px;">TOTAL</span>
                    <span class="total-amount" id="total-pedido">$0.00</span>
                </div>
                <button class="btn-pay" id="btn-cobrar">COBRAR PEDIDO</button>
            </div>
        </div>
    </main>

    <div id="modalSelector" class="modal"><div class="modal-content"><h3 id="selector-title">Seleccionar</h3><div class="opt-grid" id="selector-options"></div></div></div>
    <div id="modalModificadores" class="modal"><div class="modal-content"><h3 id="modal-mod-titulo">Personalizar</h3><div class="opt-grid" id="modal-mod-opciones" style="display: flex; flex-direction: column;"></div><button id="btn-cancelar-mod" style="margin-top: 15px; width: 100%; padding: 12px; background: #eee; border:none; border-radius:8px; font-weight:bold;">Cancelar</button></div></div>

    <script>
        function parseJwt(t) { try { return JSON.parse(decodeURIComponent(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } catch(e) { return null; } }

        document.addEventListener('DOMContentLoaded', () => {
            const API_BASE = 'https://olimpollo-api.onrender.com/api';
            let menuData = { productos: [], opciones: {} }, carrito = [];
            let selectedCanal = 'OyR', selectedPago = 'Efectivo', selectedTipo = 'Para Llevar'; 
            let editModeId = null; // MODO EDICIÓN

            // DOM
            const menuContainer = document.getElementById('productos-container'), categoryContainer = document.getElementById('category-container'), listaCarrito = document.getElementById('lista-carrito'), totalPedidoSpan = document.getElementById('total-pedido'), inputAjusteTotal = document.getElementById('ajuste-total'), selectDescuento = document.getElementById('select-descuento'), btnCobrar = document.getElementById('btn-cobrar'), inputTelefono = document.getElementById('cliente-telefono'), inputClienteNombre = document.getElementById('cliente-nombre'), infoClienteCRM = document.getElementById('info-cliente-crm');

            // --- INIT & EDIT MODE CHECK ---
            const init = async () => {
                try {
                    const r = await fetch(`${API_BASE}/menu/pos`); menuData = await r.json();
                    renderCategorias(); renderProductos();
                    
                    // REVISAR SI VENIMOS A EDITAR UN PEDIDO
                    const editData = localStorage.getItem('editPedidoData');
                    if (editData) {
                        const p = JSON.parse(editData);
                        editModeId = p.id;
                        document.getElementById('edit-banner').style.display = 'block';
                        document.getElementById('edit-id-label').textContent = `#${p.id}`;
                        btnCobrar.textContent = 'ACTUALIZAR PEDIDO';
                        btnCobrar.style.background = 'var(--warning)';

                        inputClienteNombre.value = p.cliente;
                        selectedCanal = p.canal_venta || 'OyR';
                        selectedPago = p.metodo_pago || 'Efectivo';
                        selectedTipo = p.tipo_consumo || 'Para Llevar';
                        selectDescuento.value = p.descuento || 0;
                        document.getElementById('btn-select-canal').textContent = selectedCanal;
                        document.getElementById('btn-select-pago').textContent = selectedPago;
                        
                        document.querySelectorAll('.btn-tipo').forEach(b => {
                            b.classList.remove('active');
                            if(b.dataset.tipo === selectedTipo) b.classList.add('active');
                        });

                        // Reconstruir carrito
                        carrito = p.items.map(i => {
                            const match = i.nombre_producto.match(/(.*)\s\((.*)\)/);
                            return {
                                id: i.menu_producto_id,
                                nombre: match ? match[1].trim() : i.nombre_producto,
                                precio: i.precio_unitario,
                                cantidad: i.cantidad,
                                mods: match ? match[2] : '',
                                notas: i.notas || ''
                            };
                        });
                        localStorage.removeItem('editPedidoData'); // Limpiar para no trabarse
                        renderCarrito();
                    }
                } catch (e) { console.log(e); }
            };

            window.cancelarEdicion = () => { 
                localStorage.removeItem('editPedidoData');
                window.location.href = 'pedidos_lista.html'; 
            };

            // --- UI LOGIC ---
            document.querySelectorAll('.btn-tipo').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    selectedTipo = e.target.dataset.tipo;
                };
            });

            selectDescuento.addEventListener('change', () => calcularTotal());
            inputAjusteTotal.addEventListener('input', () => calcularTotal());

            // Modal Selectores
            const modalSelector = document.getElementById('modalSelector');
            const openSelector = (t, opts, cur, cb) => { document.getElementById('selector-title').textContent = t; document.getElementById('selector-options').innerHTML = ''; opts.forEach(o => { const b = document.createElement('button'); b.className = `btn-opt ${o===cur?'active':''}`; b.textContent = o; b.onclick = () => { cb(o); modalSelector.style.display = 'none'; }; document.getElementById('selector-options').appendChild(b); }); modalSelector.style.display = 'flex'; };
            document.getElementById('btn-select-canal').onclick = () => openSelector('Canal', ['OyR', 'Uber', 'Didi', 'Rappi', 'Empleado'], selectedCanal, (v) => { selectedCanal = v; document.getElementById('btn-select-canal').textContent = v; calcularTotal(); });
            document.getElementById('btn-select-pago').onclick = () => openSelector('Pago', ['Efectivo', 'Tarjeta', 'Transferencia', 'Aplicación'], selectedPago, (v) => { selectedPago = v; document.getElementById('btn-select-pago').textContent = v; calcularTotal(); });
            window.addEventListener('click', (e) => { if(e.target===modalSelector) modalSelector.style.display='none'; });

            // CRM Buscar Cliente
            btnBuscarCliente.addEventListener('click', async () => {
                const tel = inputTelefono.value.trim();
                if (tel.length < 7) return alert("Ingresa un número válido");
                try {
                    const res = await fetch(`${API_BASE}/clientes/exacto/${tel}`);
                    if (res.ok) {
                        const c = await res.json();
                        inputClienteNombre.value = c.nombre;
                        infoClienteCRM.style.display = 'block'; infoClienteCRM.style.color = 'var(--success)';
                        infoClienteCRM.innerHTML = `🌟 Frecuente | Visitas: ${c.visitas} | Puntos: ${c.puntos}`;
                    } else {
                        infoClienteCRM.style.display = 'block'; infoClienteCRM.style.color = 'var(--text-muted)';
                        infoClienteCRM.innerHTML = `🆕 Nuevo Cliente`; inputClienteNombre.focus();
                    }
                } catch (e) {}
            });

            // --- CARRITO Y TOTAL ---
            const renderCategorias = () => { const cats = ['Todos', ...new Set(menuData.productos.map(p => p.categoria))]; categoryContainer.innerHTML = ''; cats.forEach(c => { const b = document.createElement('button'); b.className = `btn-category ${c==='Todos'?'active':''}`; b.textContent = c; b.onclick = () => { document.querySelectorAll('.btn-category').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderProductos(c); }; categoryContainer.appendChild(b); }); };
            const renderProductos = (cat='Todos') => { menuContainer.innerHTML = ''; const f = cat==='Todos'?menuData.productos:menuData.productos.filter(p=>p.categoria===cat); f.forEach(p => { const b = document.createElement('div'); b.className = `btn-product ${p.grupos_modificadores?'has-mods':''}`; b.innerHTML = `<span class="prod-name">${p.nombre_venta}</span><span class="prod-price">$${p.precio_base}</span>`; b.onclick = async () => { let mAcum=[], pExtra=0; if(p.grupos_modificadores){ const gr=p.grupos_modificadores.split(',').map(g=>g.trim()).filter(Boolean); try { for(const g of gr){ const op=menuData.opciones[g]||[]; if(op.length>0){ const s = await solicitarOpcion(`Selecciona ${g}`,op); mAcum.push(s); pExtra+=s.precio_adicional; } } }catch(e){return;} } const modStr=mAcum.map(x=>x.valor).join(', '); const idx=carrito.findIndex(i=>i.id===p.id && i.mods===modStr && i.notas===''); if(idx>-1) carrito[idx].cantidad++; else carrito.push({id:p.id, nombre:p.nombre_venta, precio:p.precio_base+pExtra, cantidad:1, mods:modStr, notas:''}); renderCarrito(); }; menuContainer.appendChild(b); }); };
            
            const renderCarrito = () => { listaCarrito.innerHTML = ''; if(carrito.length===0){ listaCarrito.innerHTML='<div class="empty-cart"><i class="fas fa-shopping-basket"></i>Ticket vacío</div>'; calcularTotal(); return; } carrito.forEach((i,idx) => { listaCarrito.innerHTML += `<div class="cart-item"><div class="cart-item-header"><div class="item-info"><span class="item-name">${i.nombre}</span><span class="item-mods">${i.mods}</span><span class="item-note">${i.notas?'📝 '+i.notas:''}</span></div><div class="item-price">$${(i.precio*i.cantidad).toFixed(2)}</div></div><div class="item-controls"><button class="btn-action-sm" onclick="addNota(${idx})">Nota</button><div class="qty-controls"><button class="btn-qty" onclick="modQty(${idx},-1)">-</button><div class="qty-display">${i.cantidad}</div><button class="btn-qty" onclick="modQty(${idx},1)">+</button></div></div></div>`; }); calcularTotal(); };
            
            window.modQty = (i, d) => { carrito[i].cantidad+=d; if(carrito[i].cantidad<=0) carrito.splice(i,1); renderCarrito(); };
            window.addNota = (i) => { const n=prompt("Nota:", carrito[i].notas); if(n!==null){carrito[i].notas=n.trim(); renderCarrito();} };

            const calcularTotal = () => {
                let subtotal = carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
                let pct = parseInt(selectDescuento.value) || 0;
                let manual = parseFloat(inputAjusteTotal.value);
                
                let base = (manual && manual >= 0) ? manual : subtotal;
                let total = base * (1 - (pct / 100)); // Aplica descuento

                totalPedidoSpan.textContent = pct === 100 ? "CORTESÍA ($0.00)" : `$${total.toFixed(2)}`;
                return total;
            };

            // --- GUARDAR / ACTUALIZAR ---
            btnCobrar.addEventListener('click', async () => {
                if (carrito.length === 0) return alert('El ticket está vacío.');
                const nombre = inputClienteNombre.value.trim();
                if (!nombre) {
                    inputClienteNombre.focus();
                    return alert('Debes ingresar el Nombre o Mesa del cliente.');
                }
                
                btnCobrar.disabled = true; 
                const t = calcularTotal();
                
                const payload = { 
                    cliente: nombre, 
                    telefono: inputTelefono.value.trim(), 
                    canal_venta: selectedCanal, 
                    metodo_pago: selectedPago, 
                    total_ajustado: t, 
                    tipo_consumo: selectedTipo, 
                    descuento: parseInt(selectDescuento.value)||0,
                    items: carrito.map(i => ({ menu_producto_id: i.id, nombre_producto_completo: i.nombre + (i.mods ? ` (${i.mods})` : ''), cantidad: i.cantidad, precio_unitario: i.precio, notas: i.notas })) 
                };

                try {
                    let url = `${API_BASE}/pedidos`;
                    let method = 'POST';

                    if (editModeId) {
                        url = `${API_BASE}/pedidos/${editModeId}`;
                        method = 'PUT';
                    }

                    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error('Error al guardar');
                    
                    alert(editModeId ? '✅ Pedido actualizado.' : '✅ Pedido cobrado con éxito.');
                    
                    if(editModeId) {
                        localStorage.removeItem('editPedidoData');
                        window.location.href = 'pedidos_lista.html';
                    } else {
                        window.location.reload(); 
                    }

                } catch (e) { alert('Error: ' + e.message); btnCobrar.disabled = false; }
            });

            const solicitarOpcion = (t, opcs) => { return new Promise((res, rej) => { document.getElementById('modal-mod-titulo').textContent = t; const c = document.getElementById('modal-mod-opciones'); c.innerHTML=''; const m = document.getElementById('modalModificadores'); const cl = () => m.style.display='none'; opcs.forEach(o => { const b = document.createElement('button'); b.className = 'btn-opt'; b.innerHTML = `<span>${o.valor}</span> ${o.precio_adicional>0?`<span style="color:var(--success)">+$${o.precio_adicional}</span>`:''}`; b.onclick = () => { cl(); res(o); }; c.appendChild(b); }); document.getElementById('btn-cancelar-mod').onclick = () => { cl(); rej(new Error('Cancelado')); }; m.style.display='flex'; }); };

            init();
        });
    </script>
